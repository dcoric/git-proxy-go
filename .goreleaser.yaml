# goreleaser config (X-1): multi-arch static binaries for the proxy and the
# data-migration tool. Validate with `goreleaser check`; build locally with
# `goreleaser build --snapshot --clean`.
version: 2

project_name: git-proxy-go

before:
  hooks:
    - go mod tidy

builds:
  - id: git-proxy
    main: ./cmd/git-proxy
    binary: git-proxy
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: migrate-data
    main: ./cmd/migrate-data
    binary: migrate-data
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - git-proxy
      - migrate-data
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
  prerelease: auto
